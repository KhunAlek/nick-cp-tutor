name = "nick-cp-tutor"
main = "index.js"
compatibility_date = "2026-07-01"

# D1 binding for the events log (see logEvent in index.js). The database
# already exists in the Cloudflare account — created directly via the D1
# tool, nothing to run locally. Cloudflare Workers Builds reads this
# binding from the repo at build time, same as everything else here; no
# wrangler CLI needed on Alex's laptop.
[[d1_databases]]
binding = "DB"
database_name = "nick-cp-tutor-log"
database_id = "0f3afda9-df8a-46f5-b0b8-d1f5dcdfeccd"

# ANTHROPIC_API_KEY is a secret, not a var — never put it in this file.
# It's pushed automatically by the GitHub Actions deploy workflow
# (see ../.github/workflows/deploy.yml and ../SETUP.md), reading from
# the ANTHROPIC_API_KEY repository secret. No wrangler CLI on Alex's
# laptop needed.
